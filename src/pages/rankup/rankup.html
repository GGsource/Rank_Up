<div id="pageCenterColumn">
	<div id="headerBox">
		<!-- Header Title - Title of the grid. -->
		<input id="headerTitle" type="text" placeholder="Placeholder Title" class="headerText" maxlength="50" />
		<!-- Description - Describes what the grid is about or whatever the author wants. -->
		<textarea id="headerDescription" placeholder="Placeholder Description" class="headerText" maxlength="330" rows="3"></textarea>
	</div>
	<!-- Row List - The list of rows where the images will be moved to. -->
	<div id="rowList"></div>
	<!-- Image Container - The container that holds the images -->
	<div id="imageContainer" class="Container"></div>
</div>
